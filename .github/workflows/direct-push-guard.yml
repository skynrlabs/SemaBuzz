name: Direct Push Guard

on:
  push:
    branches: [main, dev]

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for direct push (non-merge commit)
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   context.sha,
            });

            const parentCount = commit.parents?.length ?? 0;
            const branch = context.ref.replace('refs/heads/', '');

            // A merge commit has 2 parents; a direct push has 1
            if (parentCount < 2) {
              const pusher = context.actor;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title: `⚠️ Direct push to \`${branch}\` by @${pusher}`,
                body: [
                  `A commit was pushed directly to \`${branch}\` without a pull request.`,
                  '',
                  `**Pusher:** @${pusher}`,
                  `**Commit:** ${context.sha}`,
                  `**Branch:** \`${branch}\``,
                  '',
                  'If this was intentional (e.g. a hotfix), close this issue.',
                  'Otherwise please revert and use the PR flow.',
                ].join('\n'),
                labels: ['process'],
              });
            }
