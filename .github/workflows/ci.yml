name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:

  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Checkout Protocol (for local NuGet feed)
        uses: actions/checkout@v4
        with:
          repository: skynrlabs/SemaBuzz-Protocol
          path: ../SemaBuzz-Protocol
      - name: Pack Protocol
        run: dotnet pack ../SemaBuzz-Protocol/src/SemaBuzz.Protocol/SemaBuzz.Protocol.csproj --configuration Release --output ../SemaBuzz-Protocol/nupkg
      - name: Restore
        run: dotnet restore SemaBuzz.sln
      - name: Build (Release)
        run: dotnet build SemaBuzz.sln --configuration Release --no-restore

  # ── 2. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Checkout Protocol (for local NuGet feed)
        uses: actions/checkout@v4
        with:
          repository: skynrlabs/SemaBuzz-Protocol
          path: ../SemaBuzz-Protocol
      - name: Pack Protocol
        run: dotnet pack ../SemaBuzz-Protocol/src/SemaBuzz.Protocol/SemaBuzz.Protocol.csproj --configuration Release --output ../SemaBuzz-Protocol/nupkg
      - name: Restore (for analyzers)
        run: dotnet restore SemaBuzz.sln
      - name: Check formatting — App
        run: >
          dotnet format src/SemaBuzz.App/SemaBuzz.App.csproj
          --verify-no-changes
          --severity warn
      - name: Check formatting — Styles
        run: >
          dotnet format src/SemaBuzz.Styles/SemaBuzz.Styles.csproj
          --verify-no-changes
          --severity warn
