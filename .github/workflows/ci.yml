name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:

  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore SemaBuzz.sln
      - name: Build (Release)
        run: dotnet build SemaBuzz.sln --configuration Release --no-restore

  # ── 2. Unit Tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Run unit tests
        run: >
          dotnet test tests/SemaBuzz.Tests/SemaBuzz.Tests.csproj
          --configuration Release
          --filter "Category!=Integration"
          --logger "trx;LogFileName=unit-results.trx"
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: "**/*.trx"

  # ── 3. Integration Tests ────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Run integration tests
        run: >
          dotnet test tests/SemaBuzz.Tests/SemaBuzz.Tests.csproj
          --configuration Release
          --filter "Category=Integration"
          --logger "trx;LogFileName=integration-results.trx"
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: "**/*.trx"

  # ── 4. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore (for analyzers)
        run: dotnet restore SemaBuzz.sln
      - name: Check formatting — Protocol
        run: >
          dotnet format src/SemaBuzz.Protocol/SemaBuzz.Protocol.csproj
          --verify-no-changes
          --severity warn
      - name: Check formatting — Relay
        run: >
          dotnet format src/SemaBuzz.Relay/SemaBuzz.Relay.csproj
          --verify-no-changes
          --severity warn
      - name: Check formatting — Tests
        run: >
          dotnet format tests/SemaBuzz.Tests/SemaBuzz.Tests.csproj
          --verify-no-changes
          --severity warn
